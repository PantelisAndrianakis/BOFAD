name: BOFAD self-check
on: [push, pull_request]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Checker passes clean samples
        run: sh hooks/bofad-check.sh tests/samples/Good.java tests/samples/Good.md tests/samples/SemanticBad.java tests/samples/SemanticGood.java
      - name: Checker flags dirty samples
        run: |
          if out=$(sh hooks/bofad-check.sh tests/samples/Bad.java); then echo "Bad.java passed - checker broken"; exit 1; fi
          for rule in 'SPACE INDENT' 'K&R BRACE' 'COMMENT SPACING' 'TYPE INFERENCE' 'FUNCTIONAL CHAIN' 'SWITCH ARROW' 'NULLABILITY ANNOTATION' 'MULTI-DECLARATION' 'CONSECUTIVE BLANK LINES' 'TRAILING WHITESPACE' 'EM/EN DASH'; do
            printf '%s' "$out" | grep -qF "$rule" || { echo "Rule not firing on Bad.java: $rule"; exit 1; }
          done
          printf '%s' "$out" | grep -qF 'auto speed' || { echo "auto not flagged on Bad.java"; exit 1; }
          if out=$(sh hooks/bofad-check.sh tests/samples/Bad.md); then echo "Bad.md passed - checker broken"; exit 1; fi
          for rule in 'EM/EN DASH' 'CONSECUTIVE BLANK LINES'; do
            printf '%s' "$out" | grep -qF "$rule" || { echo "Rule not firing on Bad.md: $rule"; exit 1; }
          done
      - name: Line scoping honors BOFAD_CHANGED
        run: |
          if out=$(BOFAD_CHANGED="3" sh hooks/bofad-check.sh tests/samples/Bad.java); then echo "Scoped run passed - line 3 violation missed"; exit 1; fi
          printf '%s' "$out" | grep -qF 'TYPE INFERENCE' || { echo "TYPE INFERENCE not reported for scoped line 3"; exit 1; }
          if printf '%s' "$out" | grep -qF 'FUNCTIONAL CHAIN'; then echo "Out-of-scope FUNCTIONAL CHAIN reported"; exit 1; fi
      - name: Final-check flags every rule on the dirty transcript
        run: |
          if out=$(sh hooks/bofad-final-check.sh tests/samples/transcript-dirty.jsonl); then echo "Dirty transcript passed - final check broken"; exit 1; fi
          for rule in 'EM/EN DASH' 'HEDGED DONE CLAIM' 'SUMMARY SECTION' 'TRAILING PROMISE' 'LONG REPLY'; do
            printf '%s' "$out" | grep -qF "$rule" || { echo "Rule not firing on dirty transcript: $rule"; exit 1; }
          done
      - name: Final-check passes the clean transcript and honors the loop guard
        run: |
          sh hooks/bofad-final-check.sh tests/samples/transcript-clean.jsonl
          if printf '{"transcript_path":"tests/samples/transcript-dirty.jsonl","stop_hook_active":false}' | sh hooks/bofad-final-check.sh; then echo "Hook mode passed the dirty transcript"; exit 1; fi
          printf '{"transcript_path":"tests/samples/transcript-dirty.jsonl","stop_hook_active":true}' | sh hooks/bofad-final-check.sh || { echo "Loop guard did not exit 0"; exit 1; }
      - name: Ruleset stays under the size ceiling
        run: |
          size=$(wc -c < skills/bofad/SKILL.md)
          [ "$size" -le 40000 ] || { echo "SKILL.md is $size bytes, ceiling is 40000 - cut before adding"; exit 1; }
      - name: Ruleset obeys its own prose rules
        run: sh hooks/bofad-check.sh skills/bofad/SKILL.md README.md agents/bofad-wargame.md agents/bofad-voice-check.md agents/bofad-code-check.md commands/bofad-review.md tests/voice/README.md tests/voice/probes.md tests/voice/deltas.md tests/persistence/README.md tests/persistence/deltas.md tests/persistence/probes.md
      - name: BOFAD_LITE heading anchors exist
        run: |
          grep -q '^## Voice examples' skills/bofad/SKILL.md || { echo "Heading ## Voice examples missing - hooks.json BOFAD_LITE awk depends on it"; exit 1; }
          grep -q '^## Research' skills/bofad/SKILL.md || { echo "Heading ## Research missing - hooks.json BOFAD_LITE awk depends on it"; exit 1; }
      - name: Voice examples block is append-only
        run: |
          awk '/^## Voice examples/{f=1} /^## Research/{f=0} f' skills/bofad/SKILL.md > /tmp/voice-block
          head -c "$(wc -c < tests/voice/voice-examples.golden)" /tmp/voice-block | cmp - tests/voice/voice-examples.golden || { echo "Existing voice examples were edited - the block is append-only; extend the golden after appending"; exit 1; }
      - name: Marker vocabulary stays in sync
        run: |
          for m in 'Verified' 'UNVERIFIED' 'EDITED-UNVERIFIED' 'NOTED'; do
            for f in skills/bofad/SKILL.md hooks/bofad-final-check.sh hooks/hooks.json; do
              grep -qF "$m" "$f" || { echo "Marker $m missing from $f"; exit 1; }
            done
          done
